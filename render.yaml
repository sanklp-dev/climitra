databases:
  - name: climitra-db
    plan: free
    region: singapore
    postgresMajorVersion: 16
    databaseName: climitra_db
    user: climitra_db_user

services:
  - type: web
    name: climitra
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: climitra-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://climitra.onrender.com
      - key: APIFY_API_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: 0.0.0.0
      - key: PORT
        value: 3000
